<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>InventoryPro - Injusa Stock 12W</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
          theme: {
            extend: {
              "colors": {
                // PALETA CORPORATIVA INJUSA
                "injusa-blue": "#26509F", // Azul principal extraído del logo
                "injusa-blue-dark": "#1A3B78", // Azul más oscuro para contrastes
                "background": "#F8FAFC", // Fondo muy claro y limpio
                "surface": "rgba(255, 255, 255, 0.8)", // Superficie "cristal"
                "on-surface": "#0F172A" // Texto principal oscuro
              }
            },
          },
        }
    </script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            /* Degradado de fondo sutil con los tonos Injusa */
            background: radial-gradient(circle at top right, #DBEAFE, transparent), 
                        radial-gradient(circle at bottom left, #F1F5F9, transparent), 
                        #F8FAFC; 
            min-height: 100vh;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            box-shadow: 0 25px 50px -12px rgba(38, 80, 159, 0.08); /* Sombra azulada muy sutil */
        }
        /* Degradado azul corporativo para elementos vibrantes */
        .vibrant-gradient { 
            background: linear-gradient(135deg, #3B82F6 0%, #26509F 100%); 
        }
        /* Barra de desplazamiento estética */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-8 text-on-surface antialiased">

<main class="w-full max-w-2xl">
    <div class="glass-card rounded-3xl p-6 md:p-10 transition-all duration-300">
        <header class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl vibrant-gradient text-white mb-4 shadow-xl shadow-injusa-blue/20">
                <span class="material-symbols-outlined text-4xl">inventory_2</span>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-950 tracking-tighter">InventoryPro <span class="text-injusa-blue">Injusa</span></h1>
            <p class="text-slate-500 font-medium">Disponibilidad Proyectada para Clientes Pequeños</p>
        </header>

        <div class="relative mb-6">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
            <input type="text" id="search-input" placeholder="Buscar ID de referencia..." 
                   class="w-full pl-12 pr-4 py-4 rounded-2xl border-none bg-white/70 shadow-sm focus:ring-2 focus:ring-injusa-blue focus:bg-white outline-none transition-all text-lg font-medium text-slate-800 placeholder:text-slate-400">
        </div>

        <div class="flex items-center justify-between mb-4 px-2">
            <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Referencias Semanales</h2>
            <span id="counter" class="text-xs font-bold text-injusa-blue bg-injusa-blue/10 px-3 py-1 rounded-full">Sincronizando...</span>
        </div>

        <div id="table-body" class="space-y-3 max-h-[500px] overflow-y-auto pr-2 scroll-smooth">
            <div class="flex flex-col items-center justify-center py-24 text-slate-400">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-injusa-blue mb-4"></div>
                <p class="text-sm font-medium">Conectando con la base de datos de Injusa...</p>
            </div>
        </div>

        <footer class="mt-8 pt-6 border-t border-slate-200/50 text-center">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em]">InventoryPro YOLO Edition © 2026 Injusa</p>
        </footer>
    </div>
</main>

<script>
    // TU ENLACE CONFIGURADO
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSOFHYjuBwOkQDfuedrjriM5oOpr10nc2JkTHqpgGgGviGA3Lsu38wnYD4njQIf9m3266qay2G0Z8ed/pub?gid=0&single=true&output=csv';
    
    let allData = [];

    // Función para limpiar números complejos
    function cleanNumber(val) {
        if (!val) return 0;
        let s = String(val).trim();
        if (s === '–' || s === '-' || s === '') return 0;
        s = s.replace(/\./g, '').replace(',', '.');
        return parseFloat(s) || 0;
    }

    async function loadData() {
        try {
            // Carga de datos con prevención de caché
            const response = await fetch(SHEET_URL + '&timestamp=' + Date.now());
            const csvText = await response.text();
            
            const workbook = XLSX.read(csvText, { type: 'string' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const fullRows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

            // Búsqueda dinámica de la fila de cabeceras
            let headerIndex = fullRows.findIndex(row => 
                row.some(c => String(c).trim().toUpperCase() === 'ID') && 
                row.some(c => String(c).trim().toUpperCase() === 'TOTAL')
            );

            if (headerIndex === -1) headerIndex = 6; // Backup

            const rawData = XLSX.utils.sheet_to_json(sheet, { range: headerIndex });

            // Filtrado y limpieza profunda de datos
            allData = rawData.filter(item => {
                const keyID = Object.keys(item).find(k => k.trim().toUpperCase() === 'ID');
                const keyTotal = Object.keys(item).find(k => k.trim().toUpperCase() === 'TOTAL');

                if (!keyID || !keyTotal) return false;

                const id = String(item[keyID]).trim();
                const stock = cleanNumber(item[keyTotal]);

                return id && id.toLowerCase() !== 'totales' && stock > 0;
            }).map(item => {
                const keyID = Object.keys(item).find(k => k.trim().toUpperCase() === 'ID');
                const keyTotal = Object.keys(item).find(k => k.trim().toUpperCase() === 'TOTAL');
                return {
                    id: String(item[keyID]).trim(),
                    total: cleanNumber(item[keyTotal])
                };
            });

            renderTable(allData);
        } catch (error) {
            console.error("Error técnico:", error);
            document.getElementById('table-body').innerHTML = '<p class="text-center text-red-500 py-10">Error de conexión. Contacta con administración.</p>';
        }
    }

    function renderTable(data) {
        const container = document.getElementById('table-body');
        const counter = document.getElementById('counter');
        container.innerHTML = '';
        counter.innerText = `${data.length} Referencias Listas`;

        if (data.length === 0) {
            container.innerHTML = `
                <div class="text-center py-20 text-slate-400">
                    <span class="material-symbols-outlined text-6xl mb-3 opacity-30">inventory_2</span>
                    <p class="font-bold text-lg">No hay stock disponible</p>
                    <p class="text-xs px-10">Solo se muestran referencias proyectadas con Total > 0</p>
                </div>`;
            return;
        }

        // Renderizado de las filas con diseño corporativoInjusa (azules)
        data.forEach(item => {
            const row = `
                <div class="flex items-center justify-between p-4 bg-white/50 rounded-2xl border border-white/60 shadow-sm hover:translate-x-1 hover:bg-white/90 transition-all duration-200 cursor-default group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600 transition-colors group-hover:bg-injusa-blue group-hover:text-white">
                            <span class="material-symbols-outlined text-2xl">package_2</span>
                        </div>
                        <div>
                            <p class="font-bold text-slate-950 text-lg leading-tight tracking-tight">${item.id}</p>
                            <div class="flex items-center gap-1.5 mt-0.5">
                                <span class="w-2 h-2 bg-green-500 rounded-full shadow shadow-green-200"></span>
                                <p class="text-[10px] text-green-700 font-bold uppercase tracking-wider">Disponible Inmediato</p>
                            </div>
                        </div>
                    </div>
                    <div class="text-right bg-blue-50 px-4 py-2 rounded-xl border border-blue-100 shadow-inner group-hover:bg-white transition-colors">
                        <p class="font-black text-injusa-blue text-2xl leading-none">${Math.round(item.total)}</p>
                        <p class="text-[9px] font-bold text-blue-400 uppercase tracking-tighter mt-1">unidades</p>
                    </div>
                </div>
            `;
            container.innerHTML += row;
        });
    }

    // Lógica del buscador (sin cambios funcionales)
    document.getElementById('search-input').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allData.filter(d => d.id.toLowerCase().includes(term));
        renderTable(filtered);
    });

    loadData();
</script>
</body>
</html>
