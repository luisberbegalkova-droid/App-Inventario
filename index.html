<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Injusa InventoryPro - Control de Ventas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        .yolo-gradient { background: radial-gradient(circle at top right, #26509F, #0b1c30), linear-gradient(135deg, #26509F 0%, #0ea5e9 100%); background-blend-mode: overlay; }
        .floating-card { backdrop-filter: blur(15px); background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); }
        #login-overlay { backdrop-filter: blur(40px); background: rgba(11, 28, 48, 0.98); z-index: 999; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 antialiased overflow-x-hidden">

<div id="login-overlay" class="fixed inset-0 flex items-center justify-center p-6">
    <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl text-center">
        <div class="w-20 h-20 bg-blue-50 text-blue-900 rounded-3xl flex items-center justify-center mx-auto mb-6">
            <span class="material-symbols-outlined text-4xl">verified_user</span>
        </div>
        <h2 class="text-3xl font-black text-slate-900 mb-2 tracking-tighter">Acceso Injusa</h2>
        <p class="text-slate-400 text-sm mb-8 font-medium">Identifícate para gestionar el stock.</p>
        <input id="user-name-input" type="text" class="w-full bg-slate-100 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl px-6 py-4 text-center font-bold transition-all outline-none mb-4" placeholder="Nombre y Apellido">
        <button onclick="saveUser()" class="w-full bg-blue-900 text-white font-bold py-4 rounded-2xl hover:bg-blue-800 shadow-lg active:scale-95 transition-all">Entrar</button>
    </div>
</div>

<div id="app-content" class="invisible">
    <header class="fixed top-0 w-full h-16 bg-white border-b border-slate-200 flex justify-between items-center px-4 md:px-8 z-50">
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-black text-blue-900">INJUSA</h1>
            <div class="flex items-center gap-2 bg-blue-50 px-3 py-1 rounded-full border border-blue-100">
                <span id="current-user-tag" class="text-[10px] font-black text-blue-700 uppercase tracking-widest"></span>
                <button onclick="logout()" class="flex items-center text-blue-400 hover:text-red-500 transition-colors"><span class="material-symbols-outlined text-sm">logout</span></button>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <input id="search-input" class="bg-slate-100 border-none rounded-full px-4 py-1 text-sm w-32 md:w-64" placeholder="Buscar Referencia..." type="text"/>
            <button onclick="loadData()" class="p-2 text-slate-400 hover:text-blue-900"><span id="sync-icon" class="material-symbols-outlined">sync</span></button>
        </div>
    </header>

    <main class="mt-16 min-h-screen yolo-gradient p-4 md:p-8">
        <div class="mb-8 text-white">
            <h2 class="text-4xl font-black italic tracking-tight">Panel de Reservas</h2>
            <div class="flex items-center gap-2 mt-2 text-white/60">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                <p id="counter-text" class="text-[10px] font-bold uppercase tracking-widest">Cargando...</p>
                <span class="mx-2">|</span>
                <p class="text-[10px] font-bold uppercase tracking-widest">Auto-Cierre: 15 min inactivo</p>
            </div>
        </div>
        <div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-24"></div>
    </main>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSOFHYjuBwOkQDfuedrjriM5oOpr10nc2JkTHqpgGgGviGA3Lsu38wnYD4njQIf9m3266qay2G0Z8ed/pub?gid=0&single=true&output=csv';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwrA1Orsz1fq-yqkjuV9O7A5QXKD3LskigAj_-ciPYgdG11EtMp31ye_xxrjlbzyqOPKw/exec';
    
    const MINUTOS_INACTIVIDAD = 15;
    let allData = [];
    let userName = localStorage.getItem('injusa_user');
    let t_inactividad;

    window.onload = () => { if (userName) initApp(); resetTimer(); };

    // --- SEGURIDAD: CIERRE POR INACTIVIDAD ---
    function resetTimer() {
        clearTimeout(t_inactividad);
        if (userName) t_inactividad = setTimeout(logoutAutomatico, MINUTOS_INACTIVIDAD * 60 * 1000);
    }
    window.onmousemove = resetTimer; window.onmousedown = resetTimer; window.ontouchstart = resetTimer; window.onclick = resetTimer; window.onkeydown = resetTimer;

    function logoutAutomatico() {
        if (userName) {
            localStorage.removeItem('injusa_user');
            alert("Sesión cerrada por inactividad. Identifícate de nuevo.");
            location.reload();
        }
    }

    function initApp() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('app-content').classList.remove('invisible');
        document.getElementById('current-user-tag').innerText = userName;
        loadData();
    }

    function saveUser() {
        const input = document.getElementById('user-name-input').value.trim();
        if (input.length < 3) return alert("Introduce tu nombre completo.");
        localStorage.setItem('injusa_user', input);
        userName = input;
        initApp();
    }

    function logout() { if(confirm("¿Cerrar sesión?")) { localStorage.removeItem('injusa_user'); location.reload(); } }

    function cleanNumber(val) {
        if (!val) return 0;
        let s = String(val).trim();
        if (s === '–' || s === '-' || s === '') return 0;
        s = s.replace(/\./g, '').replace(',', '.');
        return parseFloat(s) || 0;
    }

    async function loadData() {
        const syncIcon = document.getElementById('sync-icon');
        syncIcon.classList.add('animate-spin');
        try {
            const response = await fetch(SHEET_URL + '&cb=' + Date.now());
            const csvText = await response.text();
            const workbook = XLSX.read(csvText, { type: 'string' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const fullRows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            let headerIdx = fullRows.findIndex(row => row.some(c => String(c).trim().toUpperCase() === 'ID') && row.some(c => String(c).trim().toUpperCase() === 'TOTAL'));
            if (headerIdx === -1) headerIdx = 6;
            const data = XLSX.utils.sheet_to_json(sheet, { range: headerIdx });
            allData = data.filter(item => {
                const kID = Object.keys(item).find(k => k.trim().toUpperCase() === 'ID');
                const kTotal = Object.keys(item).find(k => k.trim().toUpperCase() === 'TOTAL');
                return item[kID] && cleanNumber(item[kTotal]) > 0;
            }).map(item => {
                const kID = Object.keys(item).find(k => k.trim().toUpperCase() === 'ID');
                const kTotal = Object.keys(item).find(k => k.trim().toUpperCase() === 'TOTAL');
                return { id: String(item[kID]).trim(), total: cleanNumber(item[kTotal]) };
            });
            renderGrid(allData);
            document.getElementById('counter-text').innerText = `${allData.length} Referencias Disponibles`;
        } catch (e) { console.error(e); }
        finally { syncIcon.classList.remove('animate-spin'); }
    }

    async function reservar(id, stockMax) {
        const cant = prompt(`¿Unidades de la Referencia ${id} a reservar?\n(Disponible: ${Math.round(stockMax)})`);
        if (!cant || isNaN(cant) || cant <= 0 || parseInt(cant) > stockMax) return;
        const btn = event.target;
        btn.innerText = "Procesando...";
        btn.disabled = true;
        try {
            await fetch(`${SCRIPT_URL}?id=${id}&unidades=${cant}&nombre=${encodeURIComponent(userName)}`, { mode: 'no-cors' });
            alert(`Reserva de ${cant} unidades de la Ref. ${id} confirmada.`);
            setTimeout(loadData, 2000);
        } catch (e) { alert("Error de conexión."); }
        finally { btn.innerText = "Reservar Unidades"; btn.disabled = false; }
    }

    function renderGrid(data) {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'floating-card p-6 rounded-[2.5rem] text-white shadow-2xl flex flex-col justify-between transition-all hover:scale-[1.02]';
            card.innerHTML = `
                <div>
                    <div class="flex justify-between items-start mb-2">
                        <p class="text-[10px] font-black opacity-50 uppercase tracking-[0.2em]">Referencia</p>
                        <span class="text-green-400 material-symbols-outlined text-sm">verified</span>
                    </div>
                    <p class="text-5xl font-black mb-6 tracking-tighter leading-none break-all">${item.id}</p>
                    
                    <div class="flex items-baseline gap-2 mb-8">
                        <p class="text-3xl font-bold">${Math.round(item.total)}</p>
                        <p class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Unidades</p>
                    </div>
                </div>
                <button onclick="reservar('${item.id}', ${item.total})" class="w-full bg-white text-blue-900 font-bold py-4 rounded-2xl hover:bg-blue-50 shadow-lg active:scale-95 uppercase text-xs tracking-widest">
                    Reservar Unidades
                </button>
            `;
            grid.appendChild(card);
        });
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
        renderGrid(allData.filter(d => d.id.toLowerCase().includes(e.target.value.toLowerCase())));
    });
</script>
</body>
</html>
