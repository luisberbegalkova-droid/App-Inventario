<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Injusa InventoryPro - Cesta de Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        .yolo-gradient { background: radial-gradient(circle at top right, #26509F, #0b1c30), linear-gradient(135deg, #26509F 0%, #0ea5e9 100%); background-blend-mode: overlay; }
        .floating-card { backdrop-filter: blur(15px); background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); }
        #login-overlay { backdrop-filter: blur(40px); background: rgba(11, 28, 48, 0.98); z-index: 100; }
        .cart-drawer { transition: transform 0.3s cubic-bezier(0, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 antialiased overflow-x-hidden">

<div id="login-overlay" class="fixed inset-0 flex items-center justify-center p-6">
    <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl text-center">
        <div class="w-20 h-20 bg-blue-50 text-blue-900 rounded-3xl flex items-center justify-center mx-auto mb-6">
            <span class="material-symbols-outlined text-4xl">person</span>
        </div>
        <h2 class="text-3xl font-black text-slate-900 mb-2 tracking-tighter">Injusa Sales</h2>
        <p class="text-slate-400 text-sm mb-8 font-medium">Introduce tu nombre para iniciar un pedido.</p>
        <input id="user-name-input" type="text" class="w-full bg-slate-100 border-none rounded-2xl px-6 py-4 text-center font-bold mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Nombre Comercial">
        <button onclick="saveUser()" class="w-full bg-blue-900 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95">Iniciar Sesión</button>
    </div>
</div>

<div id="app-content" class="invisible">
    <header class="fixed top-0 w-full h-16 bg-white border-b border-slate-200 flex justify-between items-center px-4 md:px-8 z-50">
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-black text-blue-900">INJUSA</h1>
            <span id="current-user-tag" class="bg-blue-50 text-blue-700 text-[10px] font-black px-2 py-1 rounded-md uppercase"></span>
        </div>
        <div class="flex items-center gap-2">
            <input id="search-input" class="bg-slate-100 border-none rounded-full px-4 py-1 text-sm w-32 md:w-48" placeholder="Referencia..." type="text"/>
            <button onclick="toggleCart()" class="relative p-2 text-blue-900">
                <span class="material-symbols-outlined">shopping_basket</span>
                <span id="cart-count" class="absolute top-0 right-0 bg-red-500 text-white text-[8px] font-black w-4 h-4 rounded-full flex items-center justify-center">0</span>
            </button>
        </div>
    </header>

    <main class="mt-16 min-h-screen yolo-gradient p-4 md:p-8">
        <div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-24"></div>
    </main>

    <div id="cart-drawer" class="fixed right-0 top-0 h-full w-full max-w-sm bg-white shadow-2xl z-[60] translate-x-full cart-drawer flex flex-col">
        <div class="p-6 border-b flex justify-between items-center">
            <h3 class="text-xl font-black text-blue-900">Tu Cesta</h3>
            <button onclick="toggleCart()" class="text-slate-400"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4">
            </div>
        <div class="p-6 border-t bg-slate-50">
            <button id="btn-finalizar" onclick="finalizarPedido()" class="w-full bg-blue-900 text-white font-bold py-4 rounded-2xl shadow-xl disabled:opacity-50">
                Finalizar Pedido y Salir
            </button>
        </div>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSOFHYjuBwOkQDfuedrjriM5oOpr10nc2JkTHqpgGgGviGA3Lsu38wnYD4njQIf9m3266qay2G0Z8ed/pub?gid=0&single=true&output=csv';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwrA1Orsz1fq-yqkjuV9O7A5QXKD3LskigAj_-ciPYgdG11EtMp31ye_xxrjlbzyqOPKw/exec';
    
    let allData = [];
    let cart = [];
    let userName = "";

    function saveUser() {
        const input = document.getElementById('user-name-input').value.trim();
        if (input.length < 3) return alert("Pon tu nombre.");
        userName = input;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('app-content').classList.remove('invisible');
        document.getElementById('current-user-tag').innerText = userName;
        loadData();
    }

    function toggleCart() {
        document.getElementById('cart-drawer').classList.toggle('translate-x-full');
    }

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL + '&cb=' + Date.now());
            const csvText = await response.text();
            const workbook = XLSX.read(csvText, { type: 'string' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const fullRows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            let headerIdx = fullRows.findIndex(row => row.some(c => String(c).trim().toUpperCase() === 'ID'));
            const data = XLSX.utils.sheet_to_json(sheet, { range: headerIdx });
            
            allData = data.filter(item => {
                const kID = Object.keys(item).find(k => k.trim().toUpperCase() === 'ID');
                const kTotal = Object.keys(item).find(k => k.trim().toUpperCase() === 'TOTAL');
                return item[kID] && parseFloat(String(item[kTotal]).replace(/\./g, '').replace(',', '.')) > 0;
            }).map(item => {
                const kID = Object.keys(item).find(k => k.trim().toUpperCase() === 'ID');
                const kTotal = Object.keys(item).find(k => k.trim().toUpperCase() === 'TOTAL');
                return { id: String(item[kID]).trim(), total: parseFloat(String(item[kTotal]).replace(/\./g, '').replace(',', '.')) };
            });
            renderGrid(allData);
        } catch (e) { console.error(e); }
    }

    function añadirCesta(id, stock) {
        const cant = prompt(`¿Unidades de Ref. ${id}?`, "1");
        if (!cant || isNaN(cant) || cant <= 0 || parseInt(cant) > stock) return alert("Cantidad no válida");
        
        cart.push({ id, unidades: parseInt(cant) });
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cart-items');
        document.getElementById('cart-count').innerText = cart.length;
        container.innerHTML = '';
        cart.forEach((item, index) => {
            container.innerHTML += `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl border">
                    <div><p class="font-bold text-blue-900">${item.id}</p><p class="text-xs text-slate-500">${item.unidades} uds.</p></div>
                    <button onclick="cart.splice(${index},1);updateCartUI();" class="text-red-400"><span class="material-symbols-outlined">delete</span></button>
                </div>
            `;
        });
    }

    async function finalizarPedido() {
        if (cart.length === 0) return;
        const btn = document.getElementById('btn-finalizar');
        btn.innerText = "Procesando Pedido...";
        btn.disabled = true;

        const pedidosStr = cart.map(i => `${i.id}:${i.unidades}`).join(",");
        try {
            await fetch(`${SCRIPT_URL}?nombre=${encodeURIComponent(userName)}&pedidos=${pedidosStr}`, { mode: 'no-cors' });
            alert("Pedido enviado correctamente. Se cerrará la sesión.");
            location.reload(); // LOGOUT automático
        } catch (e) { alert("Error"); btn.disabled = false; }
    }

    function renderGrid(data) {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'floating-card p-6 rounded-[2.5rem] text-white flex flex-col justify-between shadow-2xl';
            div.innerHTML = `
                <div>
                    <p class="text-[10px] font-black opacity-50 uppercase mb-1 tracking-widest">Referencia</p>
                    <p class="text-5xl font-black mb-6 tracking-tighter leading-none">${item.id}</p>
                    <div class="flex items-baseline gap-2 mb-8">
                        <p class="text-3xl font-bold">${Math.round(item.total)}</p>
                        <p class="text-[10px] font-bold opacity-50 uppercase tracking-widest text-sky-200">Unidades</p>
                    </div>
                </div>
                <button onclick="añadirCesta('${item.id}', ${item.total})" class="w-full bg-white text-blue-900 font-bold py-4 rounded-2xl shadow-lg active:scale-95 uppercase text-xs tracking-widest">Añadir a la cesta</button>
            `;
            grid.appendChild(div);
        });
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        renderGrid(allData.filter(d => d.id.toLowerCase().includes(term)));
    });
</script>
</body>
</html>
