<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>InventoryPro - Stock 12 Semanas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
          theme: {
            extend: {
              "colors": {
                "primary": "#6366f1",
                "background": "#fdfcfe",
                "surface": "rgba(255, 255, 255, 0.7)",
                "on-surface": "#1e293b"
              }
            },
          },
        }
    </script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #fef2f2, transparent), 
                        radial-gradient(circle at bottom left, #eef2ff, transparent), #fdfcfe; 
            min-height: 100vh;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.4); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); 
        }
        .vibrant-gradient { background: linear-gradient(135deg, #6366f1 0%, #f43f5e 100%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-8 text-on-surface">

<main class="w-full max-w-2xl">
    <div class="glass-card rounded-3xl p-6 md:p-10">
        <header class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl vibrant-gradient text-white mb-4 shadow-xl">
                <span class="material-symbols-outlined text-4xl">inventory_2</span>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">InventoryPro</h1>
            <p class="text-slate-500 font-medium">Consulta de Disponibilidad Proyectada</p>
        </header>

        <div class="relative mb-6">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
            <input type="text" id="search-input" placeholder="Buscar ID de referencia..." 
                   class="w-full pl-12 pr-4 py-4 rounded-2xl border-none bg-white shadow-sm focus:ring-2 focus:ring-primary outline-none transition-all text-lg">
        </div>

        <div class="flex items-center justify-between mb-4 px-2">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Referencias en Stock</h2>
            <span id="counter" class="text-xs font-bold text-primary bg-primary/10 px-3 py-1 rounded-full">Cargando...</span>
        </div>

        <div id="table-body" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
            <div class="flex flex-col items-center justify-center py-20 text-slate-400">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-primary mb-4"></div>
                <p>Sincronizando con Google Sheets...</p>
            </div>
        </div>

        <footer class="mt-8 pt-6 border-t border-slate-200/50 text-center text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em]">
            Actualización Automática Semanal
        </footer>
    </div>
</main>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSOFHYjuBwOkQDfuedrjriM5oOpr10nc2JkTHqpgGgGviGA3Lsu38wnYD4njQIf9m3266qay2G0Z8ed/pub?gid=0&single=true&output=csv';
    
    let allData = [];

    // Función para limpiar números complejos (maneja guiones, puntos de miles y comas decimales)
    function cleanNumber(val) {
        if (!val) return 0;
        let s = String(val).trim();
        if (s === '–' || s === '-' || s === '') return 0;
        // Quitamos puntos de miles y cambiamos coma por punto
        s = s.replace(/\./g, '').replace(',', '.');
        return parseFloat(s) || 0;
    }

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL + '&nocache=' + Date.now());
            const csvText = await response.text();
            
            const workbook = XLSX.read(csvText, { type: 'string' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const fullRows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

            // 1. Buscamos dinámicamente la fila de cabeceras
            let headerIndex = fullRows.findIndex(row => 
                row.some(c => String(c).trim().toUpperCase() === 'ID') && 
                row.some(c => String(c).trim().toUpperCase() === 'TOTAL')
            );

            if (headerIndex === -1) headerIndex = 6; // Backup si falla la detección

            // 2. Procesamos datos desde esa fila
            const rawData = XLSX.utils.sheet_to_json(sheet, { range: headerIndex });

            allData = rawData.filter(item => {
                // Buscamos las llaves ID y Total ignorando espacios
                const keyID = Object.keys(item).find(k => k.trim().toUpperCase() === 'ID');
                const keyTotal = Object.keys(item).find(k => k.trim().toUpperCase() === 'TOTAL');

                if (!keyID || !keyTotal) return false;

                const id = String(item[keyID]).trim();
                const stock = cleanNumber(item[keyTotal]);

                return id && id.toLowerCase() !== 'totales' && stock > 0;
            }).map(item => {
                const keyID = Object.keys(item).find(k => k.trim().toUpperCase() === 'ID');
                const keyTotal = Object.keys(item).find(k => k.trim().toUpperCase() === 'TOTAL');
                return {
                    id: String(item[keyID]).trim(),
                    total: cleanNumber(item[keyTotal])
                };
            });

            renderTable(allData);
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('table-body').innerHTML = '<p class="text-center text-red-500 py-10">Error de conexión. Verifica la publicación del Sheet.</p>';
        }
    }

    function renderTable(data) {
        const container = document.getElementById('table-body');
        const counter = document.getElementById('counter');
        container.innerHTML = '';
        counter.innerText = `${data.length} Referencias`;

        if (data.length === 0) {
            container.innerHTML = `
                <div class="text-center py-16 text-slate-400">
                    <span class="material-symbols-outlined text-5xl mb-2 opacity-20">inventory</span>
                    <p class="font-semibold">No se encontraron excedentes</p>
                    <p class="text-xs">Solo se muestran referencias con Total > 0</p>
                </div>`;
            return;
        }

        data.forEach(item => {
            const row = `
                <div class="flex items-center justify-between p-4 bg-white/50 rounded-2xl border border-white/60 shadow-sm hover:translate-x-1 transition-all duration-200">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-500">
                            <span class="material-symbols-outlined">package_2</span>
                        </div>
                        <div>
                            <p class="font-bold text-slate-900 leading-tight">${item.id}</p>
                            <p class="text-[10px] text-green-600 font-bold uppercase tracking-wider">Disponible Ahora</p>
                        </div>
                    </div>
                    <div class="text-right bg-white/80 px-4 py-2 rounded-xl border border-white/40 shadow-inner">
                        <p class="font-black text-slate-800 text-xl leading-none">${Math.round(item.total)}</p>
                        <p class="text-[9px] font-bold text-slate-400 uppercase mt-1">unidades</p>
                    </div>
                </div>
            `;
            container.innerHTML += row;
        });
    }

    // Buscador
    document.getElementById('search-input').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allData.filter(d => d.id.toLowerCase().includes(term));
        renderTable(filtered);
    });

    loadData();
</script>
</body>
</html>
