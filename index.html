<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Injusa InventoryPro - Full Suite</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
          theme: {
            extend: {
              "colors": {
                "injusa-blue": "#26509F",
                "secondary": "#26509F",
                "surface": "#f8f9ff",
                "on-surface": "#0b1c30",
                "outline-variant": "#c6c6cd"
              },
              "fontFamily": {
                "serif-display": ["Playfair Display", "serif"],
                "body-md": ["Inter", "sans-serif"]
              }
            },
          },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* Fondo dinámico Injusa */
        .yolo-gradient { 
            background: radial-gradient(circle at top right, #26509F, #0b1c30), 
                        linear-gradient(135deg, #26509F 0%, #0ea5e9 100%); 
            background-blend-mode: overlay; 
        }

        /* Tarjetas de cristal para las referencias */
        .floating-card {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .floating-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 20px rgba(14, 165, 233, 0.2);
        }

        /* Scrollbar invisible pero funcional */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface antialiased overflow-hidden">

<aside class="fixed left-0 top-0 h-full w-[280px] border-r border-outline-variant bg-white flex flex-col py-6 px-4 z-50">
    <div class="mb-10 px-2">
        <h1 class="text-2xl font-black text-injusa-blue tracking-tighter">INJUSA</h1>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">InventoryPro</p>
    </div>
    <nav class="flex-1 space-y-1">
        <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-50 text-injusa-blue font-bold">
            <span class="material-symbols-outlined">inventory_2</span>
            <span>Stock Total 12W</span>
        </div>
        <div class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-50 transition-colors cursor-not-allowed">
            <span class="material-symbols-outlined">history</span>
            <span>Historial</span>
        </div>
    </nav>
    <div class="mt-auto pt-6 border-t border-outline-variant">
        <div class="bg-slate-900 rounded-2xl p-4 text-white">
            <p class="text-[10px] font-bold opacity-50 uppercase mb-1">Usuario</p>
            <p class="text-sm font-bold">Dpto. Comercial</p>
        </div>
    </div>
</aside>

<header class="fixed top-0 right-0 w-[calc(100%-280px)] h-16 bg-white border-b border-outline-variant flex justify-between items-center px-8 z-40">
    <div class="relative w-96">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
        <input id="search-input" class="w-full bg-slate-50 border-none rounded-xl pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-injusa-blue/20" placeholder="Buscar referencia..." type="text"/>
    </div>
    <div class="flex items-center gap-4">
        <div id="sync-status" class="flex items-center gap-2 px-3 py-1 bg-green-50 rounded-full">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-[10px] font-bold text-green-700 uppercase">Live Data</span>
        </div>
        <button onclick="loadData()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
            <span id="sync-icon" class="material-symbols-outlined text-slate-600">sync</span>
        </button>
    </div>
</header>

<main class="ml-[280px] mt-16 h-[calc(100vh-64px)] relative yolo-gradient flex flex-col p-8 overflow-hidden">
    
    <div class="mb-8">
        <h2 class="font-serif-display text-4xl italic text-white drop-shadow-md">Stock Excedente Proyectado</h2>
        <p id="counter-text" class="text-white/60 text-xs font-bold uppercase tracking-widest mt-1">Cargando catálogo completo...</p>
    </div>

    <div id="main-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 overflow-y-auto custom-scroll pb-20 pr-4">
        <div class="col-span-full py-20 text-center text-white/50">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-white mx-auto mb-4"></div>
            <p>Accediendo a los datos de producción...</p>
        </div>
    </div>

    <div class="absolute inset-0 overflow-hidden pointer-events-none opacity-30">
        <div class="absolute -top-1/4 -right-1/4 w-[600px] h-[600px] bg-sky-400 blur-[120px] rounded-full"></div>
        <div class="absolute -bottom-1/4 -left-1/4 w-[600px] h-[600px] bg-blue-800 blur-[120px] rounded-full"></div>
    </div>
</main>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSOFHYjuBwOkQDfuedrjriM5oOpr10nc2JkTHqpgGgGviGA3Lsu38wnYD4njQIf9m3266qay2G0Z8ed/pub?gid=0&single=true&output=csv';
    let allData = [];

    function cleanNumber(val) {
        if (!val) return 0;
        let s = String(val).trim();
        if (s === '–' || s === '-' || s === '') return 0;
        s = s.replace(/\./g, '').replace(',', '.');
        return parseFloat(s) || 0;
    }

    async function loadData() {
        const syncIcon = document.getElementById('sync-icon');
        syncIcon.classList.add('animate-spin');
        
        try {
            const response = await fetch(SHEET_URL + '&nocache=' + Date.now());
            const csvText = await response.text();
            const workbook = XLSX.read(csvText, { type: 'string' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const fullRows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

            // Buscamos la fila de cabeceras (ID / Total)
            let headerIndex = fullRows.findIndex(row => 
                row.some(c => String(c).trim().toUpperCase() === 'ID') && 
                row.some(c => String(c).trim().toUpperCase() === 'TOTAL')
            );

            if (headerIndex === -1) headerIndex = 6;
            const rawData = XLSX.utils.sheet_to_json(sheet, { range: headerIndex });

            allData = rawData.filter(item => {
                const keyID = Object.keys(item).find(k => k.trim().toUpperCase() === 'ID');
                const keyTotal = Object.keys(item).find(k => k.trim().toUpperCase() === 'TOTAL');
                if (!keyID || !keyTotal) return false;
                const id = String(item[keyID]).trim();
                const stock = cleanNumber(item[keyTotal]);
                return id && id.toLowerCase() !== 'totales' && stock > 0;
            }).map(item => {
                const keyID = Object.keys(item).find(k => k.trim().toUpperCase() === 'ID');
                const keyTotal = Object.keys(item).find(k => k.trim().toUpperCase() === 'TOTAL');
                return { id: String(item[keyID]).trim(), total: cleanNumber(item[keyTotal]) };
            });

            document.getElementById('counter-text').innerText = `${allData.length} Referencias con stock en positivo`;
            renderGrid(allData);
        } catch (e) {
            console.error(e);
        } finally {
            syncIcon.classList.remove('animate-spin');
        }
    }

    function renderGrid(data) {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';

        if (data.length === 0) {
            grid.innerHTML = '<p class="col-span-full text-center text-white/50 py-20 font-bold">No se han encontrado resultados.</p>';
            return;
        }

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'floating-card p-5 rounded-2xl flex flex-col justify-between';
            card.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <div class="w-10 h-10 rounded-lg bg-white/10 flex items-center justify-center text-sky-300">
                        <span class="material-symbols-outlined">package_2</span>
                    </div>
                    <span class="bg-green-500/20 text-green-300 px-2 py-1 rounded text-[10px] font-black uppercase tracking-widest">Disponible</span>
                </div>
                <div>
                    <p class="text-white/40 text-[10px] font-bold uppercase tracking-widest mb-1">Referencia</p>
                    <p class="text-white font-bold text-xl tracking-tight">${item.id}</p>
                </div>
                <div class="mt-6 pt-4 border-t border-white/10 flex justify-between items-end">
                    <div>
                        <p class="text-white/40 text-[10px] font-bold uppercase mb-1">Stock Proyectado</p>
                        <p class="text-white font-black text-3xl leading-none">${Math.round(item.total)}</p>
                    </div>
                    <p class="text-sky-300/50 text-[10px] font-bold uppercase mb-1">unidades</p>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // Buscador en tiempo real para todas las referencias
    document.getElementById('search-input').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allData.filter(d => d.id.toLowerCase().includes(term));
        renderGrid(filtered);
    });

    // Carga inicial al entrar
    loadData();
</script>
</body>
</html>
