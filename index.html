<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Stock 12 Semanas - InventoryPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
          theme: {
            extend: {
              "colors": {
                "primary": "#6366f1",
                "background": "#fdfcfe",
                "surface": "rgba(255, 255, 255, 0.7)",
                "on-surface": "#1e293b",
                "on-surface-variant": "#64748b"
              }
            },
          },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #fef2f2, transparent), radial-gradient(circle at bottom left, #eef2ff, transparent), #fdfcfe; }
        .glass-card { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
        .vibrant-gradient { background: linear-gradient(135deg, #818cf8 0%, #f43f5e 100%); }
        #table-body::-webkit-scrollbar { width: 6px; }
        #table-body::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex items-center justify-center p-md">
<main class="w-full max-w-2xl">
    <div class="glass-card rounded-2xl p-lg md:p-xl">
        <header class="text-center mb-lg">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full vibrant-gradient text-white mb-sm shadow-lg">
                <span class="material-symbols-outlined text-3xl">inventory_2</span>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 mb-xs">InventoryPro</h1>
            <p class="text-on-surface-variant font-medium">📦 Disponibilidad Real (Próximas 12 Semanas)</p>
        </header>

        <section class="mb-md">
            <div class="relative">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                <input type="text" id="search-input" placeholder="Buscar ID de referencia..." 
                       class="w-full pl-12 pr-4 py-4 rounded-xl border-none bg-white/60 shadow-sm focus:ring-2 focus:ring-primary outline-none transition-all">
            </div>
        </section>

        <section>
            <div class="flex items-center justify-between mb-sm px-2">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Stock Disponible</h3>
                <span id="counter" class="text-xs font-bold text-primary bg-primary/10 px-3 py-1 rounded-full">Sincronizando...</span>
            </div>
            
            <div id="table-body" class="space-y-3 max-h-[500px] overflow-y-auto p-1 text-center">
                <div class="py-20">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-primary mx-auto mb-4"></div>
                    <p class="text-slate-400">Cargando base de datos...</p>
                </div>
            </div>
        </section>

        <footer class="mt-xl pt-lg border-t border-slate-200/50 text-center">
            <p class="text-[10px] text-slate-400 font-extrabold uppercase tracking-[0.3em]">Actualizado automáticamente vía Google Sheets</p>
        </footer>
    </div>
</main>

<script>
    // ENLACE ACTUALIZADO
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSOFHYjuBwOkQDfuedrjriM5oOpr10nc2JkTHqpgGgGviGA3Lsu38wnYD4njQIf9m3266qay2G0Z8ed/pub?gid=0&single=true&output=csv';
    
    let allData = [];

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL + '&cb=' + Date.now());
            const csvText = await response.text();
            
            const workbook = XLSX.read(csvText, { type: 'string' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            
            // Empezamos en la fila 7 (range: 6) para saltar la leyenda
            const rawRows = XLSX.utils.sheet_to_json(sheet, { range: 6 });

            allData = rawRows.filter(item => {
                // Buscamos la columna "Total" de forma flexible
                const totalKey = Object.keys(item).find(k => k.trim() === 'Total');
                const totalValue = totalKey ? parseFloat(item[totalKey]) : NaN;
                
                // Buscamos la columna "ID" de forma flexible
                const idKey = Object.keys(item).find(k => k.trim() === 'ID');
                const idValue = idKey ? item[idKey] : null;

                return idValue && !isNaN(totalValue) && totalValue > 0 && idValue.toString().toLowerCase() !== 'totales';
            });

            renderTable(allData);
        } catch (error) {
            console.error(error);
            document.getElementById('table-body').innerHTML = '<p class="text-red-500 py-10">Error al leer los datos. Asegúrate de que el Google Sheet esté publicado como CSV.</p>';
        }
    }

    function renderTable(data) {
        const tableBody = document.getElementById('table-body');
        const counter = document.getElementById('counter');
        tableBody.innerHTML = '';
        counter.innerText = `${data.length} Referencias`;

        if (data.length === 0) {
            tableBody.innerHTML = '<p class="text-slate-400 py-20 font-medium text-center">No hay stock positivo proyectado para hoy.</p>';
            return;
        }

        data.forEach(item => {
            const idKey = Object.keys(item).find(k => k.trim() === 'ID');
            const totalKey = Object.keys(item).find(k => k.trim() === 'Total');
            
            const row = `
                <div class="flex items-center justify-between p-4 bg-white/50 rounded-xl border border-white/60 shadow-sm hover:bg-white/80 transition-all text-left">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-lg bg-indigo-50 flex items-center justify-center text-indigo-500">
                            <span class="material-symbols-outlined">inventory</span>
                        </div>
                        <div>
                            <p class="font-bold text-slate-900 text-lg">${item[idKey]}</p>
                            <p class="text-[10px] text-green-600 font-bold uppercase tracking-wider">Disponible Inmediato</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-slate-800 text-xl leading-none">${Math.round(item[totalKey])}</p>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter mt-1">unidades</p>
                    </div>
                </div>
            `;
            tableBody.innerHTML += row;
        });
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allData.filter(item => {
            const idKey = Object.keys(item).find(k => k.trim() === 'ID');
            return item[idKey].toString().toLowerCase().includes(term);
        });
        renderTable(filtered);
    });

    loadData();
</script>
</body>
</html>
